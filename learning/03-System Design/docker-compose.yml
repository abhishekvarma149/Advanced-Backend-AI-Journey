services:
    nginx:
      image: nginx
      ports:
        - 8000:80
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf
      
    ##creating a server
    server1:
      build: ./server
      env-file: ./server/.env
      ports:
        - 7000:5000
    
    server2:
      build: ./server
      env-file: ./server/.env
      ports:
        - 7001:5000


